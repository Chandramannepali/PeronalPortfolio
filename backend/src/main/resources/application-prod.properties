server.port=8080

# Production Database (configurable via environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/portfoliodb_prod}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (disabled for security in production)
spring.h2.console.enabled=false

# CORS (Production Domain configured via env var, defaults to localhost:5173)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Admin Passcode HASH (configurable via environment variables)
app.admin.passcode-hash=${APP_ADMIN_PASSCODE_HASH:240eb518562d989f6d482594689cdcc9cf1445b2067746de54203df4807436d4}
